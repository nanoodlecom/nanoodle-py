<svg xmlns="http://www.w3.org/2000/svg" width="880" height="280" viewBox="0 0 880 280" role="img" aria-labelledby="title desc">
  <title id="title">nanoodle execution flow</title>
  <desc id="desc">Workflow.load, wf.run, topological order with concurrent lanes, then outputs and cost</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
  </defs>

  <rect width="880" height="280" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- Your code box -->
  <rect x="24" y="28" width="200" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="124" y="52" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.04em">YOUR CODE</text>

  <rect x="44" y="68" width="160" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="124" y="93" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1e1b4b">Workflow.load(…)</text>

  <line x1="124" y1="108" x2="124" y2="128" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="44" y="132" width="160" height="40" rx="8" fill="#eef2ff" stroke="#6366f1"/>
  <text x="124" y="157" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#1e1b4b">wf.run({"Text"})</text>

  <line x1="124" y1="172" x2="124" y2="188" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="44" y="192" width="160" height="24" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="124" y="208" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#475569">result["Image"].save(…)</text>

  <!-- arrow into engine -->
  <line x1="224" y1="152" x2="268" y2="152" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Executor box -->
  <rect x="280" y="28" width="360" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="460" y="52" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.04em">EXECUTOR</text>

  <!-- topo -->
  <rect x="300" y="68" width="140" height="36" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="370" y="91" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Topological order</text>

  <line x1="370" y1="104" x2="370" y2="122" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- concurrent lanes -->
  <text x="370" y="140" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">Concurrent lanes</text>
  <rect x="300" y="150" width="64" height="28" rx="6" fill="#d1fae5" stroke="#10b981"/>
  <text x="332" y="168" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#065f46">node A</text>
  <rect x="374" y="150" width="64" height="28" rx="6" fill="#d1fae5" stroke="#10b981"/>
  <text x="406" y="168" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#065f46">node B</text>

  <line x1="450" y1="86" x2="488" y2="86" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- node types -->
  <rect x="498" y="68" width="120" height="56" rx="8" fill="#fff7ed" stroke="#ea580c"/>
  <text x="558" y="90" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#7c2d12">Local nodes</text>
  <text x="558" y="108" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#9a3412">text · join · choice</text>

  <rect x="498" y="140" width="120" height="56" rx="8" fill="#ffedd5" stroke="#ea580c"/>
  <text x="558" y="162" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="600" fill="#7c2d12">NanoGPT nodes</text>
  <text x="558" y="180" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#9a3412">LLM · image · video</text>

  <!-- arrow to outputs -->
  <line x1="640" y1="152" x2="684" y2="152" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Outputs -->
  <rect x="696" y="28" width="160" height="200" rx="12" fill="#ffffff" stroke="#86efac" stroke-width="1.5"/>
  <text x="776" y="52" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#64748b" letter-spacing="0.04em">RESULT</text>

  <rect x="716" y="72" width="120" height="36" rx="8" fill="#ecfdf5" stroke="#059669"/>
  <text x="776" y="95" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="600" fill="#064e3b">Media / text</text>

  <rect x="716" y="124" width="120" height="36" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="776" y="147" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#166534">cost_usd</text>

  <rect x="716" y="176" width="120" height="36" rx="8" fill="#f0fdf4" stroke="#22c55e"/>
  <text x="776" y="199" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#166534">remaining_balance</text>

  <text x="440" y="258" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#475569">Same execution semantics as the browser app · fail fast before spending on bad inputs</text>
</svg>
