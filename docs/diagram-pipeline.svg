<svg xmlns="http://www.w3.org/2000/svg" width="880" height="200" viewBox="0 0 880 200" role="img" aria-labelledby="title desc">
  <title id="title">nanoodle pipeline</title>
  <desc id="desc">Design in the nanoodle editor, save noodle-graph.json, run with the Python executor against the NanoGPT API</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eef2ff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="g4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="200" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>

  <!-- 1 Editor -->
  <rect x="28" y="48" width="160" height="96" rx="12" fill="url(#g1)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="108" y="88" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#1e1b4b">nanoodle editor</text>
  <text x="108" y="112" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#6366f1">nanoodle.io</text>
  <text x="108" y="130" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">design &amp; test</text>

  <!-- arrow 1 -->
  <line x1="198" y1="96" x2="238" y2="96" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="218" y="82" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">save</text>

  <!-- 2 Graph -->
  <rect x="248" y="48" width="160" height="96" rx="12" fill="url(#g2)" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="328" y="88" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1e1b4b">noodle-graph</text>
  <text x="328" y="108" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="700" fill="#1e1b4b">.json</text>
  <text x="328" y="130" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">portable workflow</text>

  <!-- arrow 2 -->
  <line x1="418" y1="96" x2="458" y2="96" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="438" y="82" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">load</text>

  <!-- 3 Executor -->
  <rect x="468" y="48" width="160" height="96" rx="12" fill="url(#g3)" stroke="#059669" stroke-width="1.5"/>
  <text x="548" y="84" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#064e3b">this package</text>
  <text x="548" y="106" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#059669">Python executor</text>
  <text x="548" y="128" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">PyPI · nanoodle</text>

  <!-- arrow 3 -->
  <line x1="638" y1="96" x2="678" y2="96" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="658" y="82" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10" fill="#64748b">call</text>

  <!-- 4 API -->
  <rect x="688" y="48" width="160" height="96" rx="12" fill="url(#g4)" stroke="#ea580c" stroke-width="1.5"/>
  <text x="768" y="88" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="700" fill="#7c2d12">NanoGPT API</text>
  <text x="768" y="112" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#ea580c">your key · BYOK</text>
  <text x="768" y="130" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" fill="#64748b">LLM · image · video</text>

  <!-- caption -->
  <text x="440" y="180" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#475569">Build once in the editor · re-run anywhere with Python</text>
</svg>
